# Staging overrides merged on top of config/deploy.yml.
# Deploy with:  bin/kamal deploy -d staging
#
# Only fields that differ from the base config belong here. Kamal performs a
# deep merge, so anything omitted is inherited from config/deploy.yml.

# Namespace containers, proxy labels, and volumes so staging can safely
# coexist with production on shared infrastructure. The image itself is not
# renamed — staging pulls the same artifact the production pipeline builds.
service: scriptures-staging

# Deploy to the staging host(s).
servers:
  web:
    - staging2.solfanto.org

# Terminate SSL at the Kamal proxy for the staging hostname. Requires
# config.assume_ssl and config.force_ssl in config/environments/production.rb.
proxy:
  ssl: true
  host: scriptures-staging.solfanto.org

# Staging-specific env. Secrets come from .kamal/secrets.staging if present,
# otherwise .kamal/secrets is used.
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_USER
    - POSTGRES_PASSWORD
    - S3_ENDPOINT
    - S3_ACCESS_KEY_ID
    - S3_SECRET_ACCESS_KEY
    - S3_REGION
    - S3_BUCKET
    - SMTP_SERVER_ADDRESS
    - SMTP_SERVER_PORT
    - SMTP_USER_NAME
    - SMTP_PASSWORD
  clear:
    RAILS_ENV: staging
    HOST: scriptures-staging.solfanto.org
    DB_HOST: 172.17.0.1
    POSTGRES_DB: scriptures_staging
    SMTP_FROM_ADDRESS: "no-reply@staging.solfanto.org"
    SMTP_FROM_NAME: "[Staging] Scriptures"
    WEBAUTHN_ORIGIN: "https://scriptures-staging.solfanto.org"
    WEBAUTHN_RP_ID: scriptures-staging.solfanto.org
    SOLID_QUEUE_IN_PUMA: true

