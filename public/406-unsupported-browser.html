<!doctype html>
<html lang="en">
  <head>
    <title>Unsupported browser — Scriptures</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      html { font-size: 16px; }
      body {
        background: #fafaf9;
        color: #1c1917;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0c0a09; color: #f5f5f4; }
        .icon-tile { background: #f5f5f4; color: #0c0a09; }
        .muted { color: #a8a29e; }
        .browser-list { border-color: #292524; }
        .browser-list li { border-color: #292524; }
        .browser-list a { color: #d6d3d1; }
        .browser-list a:hover { background: #1c1917; color: #f5f5f4; }
      }
      main { max-width: 32rem; width: 100%; text-align: center; }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 3rem;
        text-decoration: none;
        color: inherit;
      }
      .icon-tile {
        width: 2rem;
        height: 2rem;
        background: #1c1917;
        color: #fafaf9;
        border-radius: 0.5rem;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .icon-tile svg { width: 1.125rem; height: 1.125rem; }
      .brand-name {
        font-weight: 700;
        font-size: 1.125rem;
        letter-spacing: -0.02em;
      }
      .code {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(4rem, 15vw, 7rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: clamp(1.25rem, 3vw, 1.5rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 0.75rem;
      }
      .muted {
        color: #78716c;
        font-size: 0.9375rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .browser-list {
        list-style: none;
        padding: 0;
        border: 1px solid #e7e5e4;
        border-radius: 0.75rem;
        overflow: hidden;
        text-align: left;
      }
      .browser-list li + li { border-top: 1px solid #e7e5e4; }
      .browser-list a {
        display: block;
        padding: 0.875rem 1.125rem;
        text-decoration: none;
        color: #44403c;
        font-size: 0.9375rem;
        font-weight: 500;
        transition: all 0.15s ease;
      }
      .browser-list a:hover { background: #f5f5f4; color: #1c1917; }
    </style>
  </head>
  <body>
    <main>
      <a href="/" class="brand">
        <span class="icon-tile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <span class="brand-name">Scriptures</span>
      </a>
      <div class="code">406</div>
      <h1>Your browser is out of date</h1>
      <p class="muted">Scriptures requires a modern browser. Please upgrade to one of the following to continue.</p>
      <ul class="browser-list">
        <li><a href="https://www.google.com/chrome/">Google Chrome &rarr;</a></li>
        <li><a href="https://www.apple.com/safari/">Apple Safari &rarr;</a></li>
        <li><a href="https://www.mozilla.org/firefox/">Mozilla Firefox &rarr;</a></li>
        <li><a href="https://www.microsoft.com/edge">Microsoft Edge &rarr;</a></li>
      </ul>
    </main>
  </body>
</html>
