<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }
      html { font-size: 16px; }
      body {
        background: #fafaf9;
        color: #1c1917;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        display: grid;

        padding: 2rem;
      }
      @media (prefers-color-scheme: dark) {

        .icon-tile { background: #f5f5f4; color: #0c0a09; }

      main { max-width: 32rem; width: 100%; text-align: center; }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 3rem;
        text-decoration: none;
        color: inherit;
      }
      .icon-tile {
        width: 2rem;
        height: 2rem;
        background: #1c1917;
        color: #fafaf9;
        border-radius: 0.5rem;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .icon-tile svg { width: 1.125rem; height: 1.125rem; }
      .brand-name {
        font-weight: 700;
        font-size: 1.125rem;
        letter-spacing: -0.02em;
      }
      .code {
        font-family: "Libre Baskerville", Georgia, serif;
        font-size: clamp(4rem, 15vw, 7rem);
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: clamp(1.25rem, 3vw, 1.5rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 0.75rem;
      }
      .muted {
        color: #78716c;
        font-size: 0.9375rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .actions {
        display: flex;
        gap: 0.75rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.625rem 1.125rem;
        border-radius: 0.625rem;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.15s ease;
        border: 1px solid transparent;
      }
      .btn-primary { background: #1c1917; color: #fafaf9; }
      .btn-primary:hover { background: #292524; }
      .btn-secondary {
        border-color: #e7e5e4;
        color: #44403c;
      }
      .btn-secondary:hover { background: #f5f5f4; color: #1c1917; }

  <body>
    <main>
      <a href="/" class="brand">
        <span class="icon-tile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>

      <p class="muted">The request couldn&rsquo;t be processed. You may have tried to change something you don&rsquo;t have access to, or the data didn&rsquo;t pass validation.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Return home</a>
        <a href="javascript:history.back()" class="btn btn-secondary">Go back</a>
